<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Realtime Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }

    /* ── Setup Screen ── */
    #setup-screen {
      max-width: 740px;
      margin: 48px auto;
      padding: 32px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
    }
    #setup-screen h1 { font-size: 24px; color: #f0f6fc; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 28px; }

    .form-label { display: block; font-size: 13px; font-weight: 600; color: #8b949e; margin-bottom: 6px; }

    .api-input {
      width: 100%; padding: 9px 13px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; font-size: 14px; font-family: monospace;
      margin-bottom: 22px;
    }
    .api-input:focus { outline: none; border-color: #58a6ff; }

    .row-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .sel-badge {
      background: rgba(31,111,235,0.15); color: #58a6ff;
      padding: 2px 8px; border-radius: 99px; font-size: 12px;
    }

    .search-box {
      width: 100%; padding: 7px 11px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; font-size: 13px; margin-bottom: 8px;
    }
    .search-box:focus { outline: none; border-color: #58a6ff; }

    .ticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 4px;
      max-height: 270px;
      overflow-y: auto;
      padding: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .ticker-grid::-webkit-scrollbar { width: 4px; }
    .ticker-grid::-webkit-scrollbar-track { background: #0d1117; }
    .ticker-grid::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .tick-lbl {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 8px; border-radius: 4px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: #c9d1d9;
      transition: background 0.1s;
    }
    .tick-lbl:hover { background: #1f2937; }
    .tick-lbl input { cursor: pointer; accent-color: #58a6ff; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 22px; }
    .btn-sm {
      padding: 4px 12px; border-radius: 4px;
      border: 1px solid #30363d; background: transparent;
      color: #8b949e; font-size: 12px; cursor: pointer;
    }
    .btn-sm:hover { background: #21262d; color: #c9d1d9; }

    .btn-connect {
      width: 100%; padding: 11px;
      background: #238636; border: none; border-radius: 6px;
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-connect:hover { background: #2ea043; }

    /* ── Dashboard ── */
    #dashboard { display: none; padding: 20px; }

    .dash-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #21262d;
    }
    .dash-title { font-size: 20px; font-weight: 700; color: #f0f6fc; display: flex; align-items: center; gap: 10px; }
    .live-pill {
      font-size: 11px; font-weight: 700; padding: 3px 9px;
      background: #1a3a1a; color: #56d364; border-radius: 99px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .btn-disconnect {
      padding: 7px 16px; background: #da3633; border: none;
      border-radius: 6px; color: #fff; font-size: 13px; cursor: pointer;
    }
    .btn-disconnect:hover { background: #f85149; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(295px, 1fr));
      gap: 16px;
    }

    .stock-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; padding: 16px;
      transition: border-color 0.5s;
    }
    .stock-card.flash-up   { border-color: #238636; }
    .stock-card.flash-down { border-color: #da3633; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .card-ticker { font-size: 19px; font-weight: 700; color: #f0f6fc; }
    .card-company { font-size: 11px; color: #8b949e; margin-top: 2px; }

    .conn-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 700; white-space: nowrap; }
    .conn-badge.live        { background: #1a3a1a; color: #56d364; }
    .conn-badge.connecting  { background: #1c2128; color: #8b949e; }
    .conn-badge.error       { background: #2d1117; color: #f85149; }

    .price-val { font-size: 27px; font-weight: 700; color: #f0f6fc; margin-bottom: 3px; }

    .price-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .price-chg { font-size: 13px; font-weight: 600; }
    .price-chg.up   { color: #56d364; }
    .price-chg.down { color: #f85149; }
    .price-time { font-size: 11px; color: #484f58; }

    .vol-row { font-size: 11px; color: #8b949e; margin-bottom: 10px; }

    .chart-wrap { height: 72px; position: relative; }

    .error-msg { color: #f85149; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>

<!-- ════════════ SETUP ════════════ -->
<div id="setup-screen">
  <h1>📈 Stock Realtime Dashboard</h1>
  <p class="subtitle">Live price streaming via Server-Sent Events · Kafka-backed · 50 companies</p>

  <label class="form-label">API Key</label>
  <input class="api-input" type="password" id="apiKey" placeholder="Paste your ADD_API_KEY here" autocomplete="off">

  <div class="row-between">
    <span class="form-label" style="margin:0">Select Tickers</span>
    <span class="sel-badge"><span id="selCount">0</span> selected</span>
  </div>
  <input class="search-box" type="text" id="searchBox" placeholder="Search ticker or company name…">
  <div class="ticker-grid" id="tickerGrid"></div>

  <div class="btn-row">
    <button class="btn-sm" onclick="selectAll()">Select All</button>
    <button class="btn-sm" onclick="clearAll()">Clear All</button>
    <button class="btn-sm" onclick="selectPreset()">Quick pick (5)</button>
  </div>

  <button class="btn-connect" onclick="startStream()">Connect &amp; Stream Live</button>
  <p id="setupErr" class="error-msg"></p>
</div>

<!-- ════════════ DASHBOARD ════════════ -->
<div id="dashboard">
  <div class="dash-nav">
    <div class="dash-title">
      Realtime Dashboard
      <span class="live-pill">● LIVE</span>
    </div>
    <button class="btn-disconnect" onclick="stopStream()">✕ Disconnect</button>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const BASE = 'https://add.piotrkojalowicz.dev';
const HISTORY_LEN = 30;

const TICKERS = [
  {t:'ACME',n:'ACME Corp.'},{t:'ALFA',n:'Alfa Technologies'},{t:'BETA',n:'Beta Retail Group'},
  {t:'CASH',n:'CashBank'},{t:'CLOUD',n:'CloudNine'},{t:'COAL',n:'Coal Energy'},
  {t:'COPR',n:'Copper Mining Co.'},{t:'DATA',n:'DataWorks'},{t:'DEVS',n:'DevStudio'},
  {t:'DRON',n:'Dronix'},{t:'ECO',n:'EcoPower'},{t:'EDU',n:'EduNext'},
  {t:'ENRG',n:'Energo'},{t:'FARM',n:'FarmFoods'},{t:'FINX',n:'FinX'},
  {t:'FOOD',n:'FoodBox'},{t:'FUEL',n:'FuelOne'},{t:'GAME',n:'GameForge'},
  {t:'GRIN',n:'GreenInvest'},{t:'HEAL',n:'HealTech'},{t:'HOME',n:'HomeBuild'},
  {t:'HYPE',n:'Hype Media'},{t:'INSR',n:'InsureCo'},{t:'IOT',n:'IoT Systems'},
  {t:'JET',n:'Jet Logistics'},{t:'LABS',n:'Labs Research'},{t:'LEND',n:'Lendify'},
  {t:'LOGI',n:'LogiWare'},{t:'MALL',n:'Mall Retail'},{t:'MEDI',n:'MediCare'},
  {t:'META',n:'MetaCom'},{t:'MOBI',n:'MobiTel'},{t:'MOVE',n:'MoveNow'},
  {t:'NET',n:'Netlink'},{t:'NOVA',n:'Nova Ventures'},{t:'OILS',n:'OilSands'},
  {t:'PARK',n:'Park Realty'},{t:'PHAR',n:'Pharmax'},{t:'PLNT',n:'Plantio'},
  {t:'PROD',n:'Prodigo'},{t:'QBIT',n:'QBit Quantum'},{t:'RAIL',n:'Rail Cargo'},
  {t:'ROBO',n:'RoboMakers'},{t:'SAFE',n:'SafeSecurity'},{t:'SHIP',n:'ShipIt'},
  {t:'SHOP',n:'ShopNow'},{t:'SOLR',n:'Solaris'},{t:'TEL',n:'TelcoPlus'},
  {t:'TRVL',n:'TravelBee'},{t:'WATR',n:'WaterWorks'}
];

// ─── State ────────────────────────────────────────────────────────────────────
let apiKey = '';
let sources   = {};   // ticker → EventSource
let retTimers = {};   // ticker → setTimeout handle
let history   = {};   // ticker → [{price}]  (last HISTORY_LEN)
let charts    = {};   // ticker → Chart.js instance
let lastPrice = {};   // ticker → number

// ─── Setup grid ───────────────────────────────────────────────────────────────
function buildGrid() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const grid = document.getElementById('tickerGrid');
  grid.innerHTML = '';
  TICKERS
    .filter(({t, n}) => t.toLowerCase().includes(q) || n.toLowerCase().includes(q))
    .forEach(({t, n}) => {
      const lbl = document.createElement('label');
      lbl.className = 'tick-lbl';
      lbl.title = n;
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.name = 'ticker'; cb.value = t;
      cb.addEventListener('change', syncCount);
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(t));
      grid.appendChild(lbl);
    });
}

function syncCount() {
  document.getElementById('selCount').textContent =
    document.querySelectorAll('input[name=ticker]:checked').length;
}

function selectAll() {
  document.querySelectorAll('input[name=ticker]').forEach(c => c.checked = true);
  syncCount();
}
function clearAll() {
  document.querySelectorAll('input[name=ticker]').forEach(c => c.checked = false);
  syncCount();
}
function selectPreset() {
  clearAll();
  ['ACME','ALFA','DATA','CLOUD','FINX'].forEach(t => {
    const cb = document.querySelector(`input[value="${t}"]`);
    if (cb) cb.checked = true;
  });
  syncCount();
}

document.getElementById('searchBox').addEventListener('input', buildGrid);
buildGrid();

// Restore saved key
const saved = localStorage.getItem('add_api_key');
if (saved) document.getElementById('apiKey').value = saved;

// ─── Connect ──────────────────────────────────────────────────────────────────
function startStream() {
  apiKey = document.getElementById('apiKey').value.trim();
  const errEl = document.getElementById('setupErr');
  if (!apiKey) { errEl.textContent = 'Please enter your API key.'; return; }

  const selected = [...document.querySelectorAll('input[name=ticker]:checked')].map(c => c.value);
  if (!selected.length) { errEl.textContent = 'Select at least one ticker.'; return; }

  errEl.textContent = '';
  localStorage.setItem('add_api_key', apiKey);

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('cardsGrid').innerHTML = '';

  selected.forEach((t, i) => {
    history[t]   = [];
    lastPrice[t] = null;
    createCard(t);
    // Stagger connections to stay within rate limits
    setTimeout(() => openStream(t), i * 350);
  });
}

function openStream(ticker) {
  const url = `${BASE}/api/stream?ticker=${ticker}&api_key=${encodeURIComponent(apiKey)}`;
  const es = new EventSource(url);
  sources[ticker] = es;
  setBadge(ticker, 'connecting', 'Connecting…');

  es.addEventListener('tick', ev => {
    try { handleTick(ticker, JSON.parse(ev.data)); } catch (_) {}
  });

  es.onopen = () => setBadge(ticker, 'live', '● LIVE');

  es.onerror = () => {
    setBadge(ticker, 'error', '⚠ Reconnecting…');
    es.close();
    delete sources[ticker];
    // Reconnect after 5 s
    retTimers[ticker] = setTimeout(() => openStream(ticker), 5000);
  };
}

// ─── Tick handler ─────────────────────────────────────────────────────────────
function handleTick(ticker, d) {
  const hist = history[ticker];
  const prev = lastPrice[ticker];
  lastPrice[ticker] = d.price;

  hist.push(d.price);
  if (hist.length > HISTORY_LEN) hist.shift();

  const priceEl  = document.getElementById(`price-${ticker}`);
  const chgEl    = document.getElementById(`chg-${ticker}`);
  const timeEl   = document.getElementById(`time-${ticker}`);
  const volEl    = document.getElementById(`vol-${ticker}`);
  const card     = document.getElementById(`card-${ticker}`);
  if (!priceEl) return;

  priceEl.textContent = `${d.price.toFixed(2)} ${d.currency || 'PLN'}`;

  if (prev !== null) {
    const diff = d.price - prev;
    const pct  = ((diff / prev) * 100).toFixed(2);
    const sign = diff >= 0 ? '+' : '';
    chgEl.textContent   = `${diff >= 0 ? '▲' : '▼'} ${sign}${diff.toFixed(2)} (${sign}${pct}%)`;
    chgEl.className     = 'price-chg ' + (diff >= 0 ? 'up' : 'down');
    card.className      = 'stock-card ' + (diff >= 0 ? 'flash-up' : 'flash-down');
    setTimeout(() => { if (card) card.className = 'stock-card'; }, 550);
  }

  timeEl.textContent = new Date(d.ts).toLocaleTimeString();
  volEl.textContent  = `Vol: ${d.volume?.toLocaleString() ?? '—'}  ·  Seq: ${d.seq}`;

  // Update sparkline
  const chart = charts[ticker];
  if (chart) {
    chart.data.labels                 = hist.map((_, i) => i);
    chart.data.datasets[0].data      = [...hist];
    const isUp = hist.length > 1 && hist[hist.length - 1] >= hist[0];
    chart.data.datasets[0].borderColor      = isUp ? '#56d364' : '#f85149';
    chart.data.datasets[0].backgroundColor = isUp
      ? 'rgba(86,211,100,0.08)' : 'rgba(248,81,73,0.08)';
    chart.update('none');
  }

  setBadge(ticker, 'live', '● LIVE');
}

// ─── Card factory ─────────────────────────────────────────────────────────────
function createCard(ticker) {
  const info = TICKERS.find(x => x.t === ticker) || { t: ticker, n: ticker };
  const div  = document.createElement('div');
  div.className = 'stock-card';
  div.id = `card-${ticker}`;
  div.innerHTML = `
    <div class="card-top">
      <div>
        <div class="card-ticker">${ticker}</div>
        <div class="card-company">${info.n}</div>
      </div>
      <span class="conn-badge connecting" id="badge-${ticker}">Connecting…</span>
    </div>
    <div class="price-val" id="price-${ticker}">—</div>
    <div class="price-meta">
      <span class="price-chg" id="chg-${ticker}"></span>
      <span class="price-time" id="time-${ticker}"></span>
    </div>
    <div class="vol-row" id="vol-${ticker}"></div>
    <div class="chart-wrap"><canvas id="canvas-${ticker}"></canvas></div>
  `;
  document.getElementById('cardsGrid').appendChild(div);

  const ctx = document.getElementById(`canvas-${ticker}`).getContext('2d');
  charts[ticker] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        data: [], fill: true, tension: 0.3,
        borderWidth: 1.5, pointRadius: 0,
        borderColor: '#58a6ff',
        backgroundColor: 'rgba(88,166,255,0.08)'
      }]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false },
        y: { display: false, grace: '5%' }
      }
    }
  });
}

function setBadge(ticker, cls, text) {
  const el = document.getElementById(`badge-${ticker}`);
  if (el) { el.className = `conn-badge ${cls}`; el.textContent = text; }
}

// ─── Disconnect ───────────────────────────────────────────────────────────────
function stopStream() {
  Object.values(sources).forEach(es => es.close());
  Object.values(retTimers).forEach(id => clearTimeout(id));
  Object.values(charts).forEach(c => c.destroy());
  sources = {}; retTimers = {}; history = {}; charts = {}; lastPrice = {};
  document.getElementById('dashboard').style.display   = 'none';
  document.getElementById('setup-screen').style.display = 'block';
}
</script>
</body>
</html>
